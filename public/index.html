<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2933" />
  <title>Organizer2 – Arbeits-Assistent</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Organizer<span>2</span></h1>
      <button id="syncBtn" class="btn btn-primary" title="Aufgaben aus Mail/Teams/JIRA/Freshdesk ableiten">
        <span class="sync-icon">⟳</span> Sync
      </button>
    </div>
    <div class="topbar-search">
      <input type="search" id="searchInput" placeholder="Suchen…" autocomplete="off" />
      <button id="searchClear" class="search-clear hidden" title="Suche zurücksetzen">✕</button>
      <button id="aiSearchBtn" class="btn btn-ghost hidden" title="KI-gestützte Suche">✨ KI</button>
    </div>
    <div class="topbar-right">
      <button id="reminderBell" class="bell" title="Fällige Reminder">
        🔔<span id="reminderCount" class="badge hidden">0</span>
      </button>
      <button id="addBtn" class="btn btn-add">+ Todo</button>
    </div>
  </header>

  <div id="searchBanner" class="search-banner hidden"></div>

  <div id="statusBar" class="status-bar"></div>

  <main id="board" class="board"></main>

  <!-- Edit/Create Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">Todo</h2>
        <button class="icon-btn" data-close>✕</button>
      </div>
      <div class="modal-body">
        <label>Kurze Beschreibung
          <input type="text" id="f-title" maxlength="200" placeholder="Was ist zu tun?" />
        </label>

        <label>Kunde
          <input type="text" id="f-customer" maxlength="120" placeholder="Kunde / Firma (optional)" list="customerList" />
          <datalist id="customerList"></datalist>
        </label>

        <div class="row">
          <label>Bereich
            <select id="f-category">
              <option value="strategic">Strategisch</option>
              <option value="operative">Operativ</option>
              <option value="sales">Salesprozesse</option>
              <option value="reminder">Reminder</option>
            </select>
          </label>
          <label>Priorität
            <select id="f-priority">
              <option value="high">Hoch</option>
              <option value="medium">Mittel</option>
              <option value="low">Niedrig</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>Ziel-Datum
            <input type="date" id="f-dueDate" />
          </label>
          <label id="f-interval-wrap" class="hidden">Reminder-Intervall (Tage)
            <input type="number" id="f-interval" min="1" value="7" />
          </label>
        </div>

        <label>Notizen
          <textarea id="f-notes" rows="4" placeholder="Kontext, Details, nächste Schritte…"></textarea>
        </label>

        <!-- Kommentare (zeitgestempelt, nach Erstellung hinzufügbar) -->
        <div id="commentsSection" class="comments-section hidden">
          <h3>Kommentare</h3>
          <ul id="commentsList" class="comments-list"></ul>
          <div class="comment-add">
            <input type="text" id="commentInput" maxlength="500" placeholder="Kommentar hinzufügen…" />
            <button id="addCommentBtn" class="btn btn-ghost">+ Kommentar</button>
          </div>
        </div>

        <div id="reminderInfo" class="reminder-info hidden"></div>

        <!-- Verknüpfte Quellen (E-Mails/Nachrichten/Tickets) -->
        <div id="linksSection" class="links-section hidden">
          <h3>Verknüpfte Vorgänge</h3>
          <ul id="linksList" class="links-list"></ul>
        </div>

        <p class="meta-line">Letzte Aktualisierung: <span id="f-updatedAt">–</span></p>
      </div>
      <div class="modal-foot">
        <button id="deleteBtn" class="btn btn-danger hidden">Löschen</button>
        <div class="spacer"></div>
        <button id="draftBtn" class="btn btn-ghost hidden">✉ Entwurf</button>
        <button id="saveBtn" class="btn btn-primary">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Draft Modal -->
  <div id="draftModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Nachricht erstellen</h2>
        <button class="icon-btn" data-close-draft>✕</button>
      </div>
      <div class="modal-body">
        <div class="row">
          <label>Kanal
            <select id="d-channel">
              <option value="email">E-Mail (Outlook)</option>
              <option value="teams">Teams</option>
            </select>
          </label>
          <label>An
            <input type="text" id="d-to" placeholder="empfänger@example.com" />
          </label>
        </div>
        <label>Anweisung an die KI (optional)
          <input type="text" id="d-instructions" placeholder="z.B. freundlich nachfassen, kurz halten" />
        </label>
        <button id="generateBtn" class="btn btn-ghost">✨ Entwurf generieren</button>
        <label>Betreff
          <input type="text" id="d-subject" />
        </label>
        <label>Text
          <textarea id="d-body" rows="8"></textarea>
        </label>
      </div>
      <div class="modal-foot">
        <div class="spacer"></div>
        <button id="sendBtn" class="btn btn-primary">Senden</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/vendor/sortable.js"></script>
  <script src="/app.js"></script>
</body>
</html>
